<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>INIM — Catálogo de Productos PCI</title>
<link href="https://fonts.googleapis.com/css2?family=Kumbh+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --inim-blue: #0E4278;
  --inim-blue-dark: #07305a;
  --inim-blue-mid: #16558f;
  --inim-blue-soft: #eaf2f8;
  --bg: #f7f9fc;
  --surface: #ffffff;
  --surface2: #f1f6fb;
  --border: #d9e4ef;
  --text: #14385c;
  --text2: #6b7c8f;
  --shadow: 0 18px 45px rgba(14,66,120,0.12);
}

body {
  font-family: 'Kumbh Sans', sans-serif;
  color: var(--text);
  min-height: 100vh;
  background:
    radial-gradient(circle at 50% 34%, rgba(14,66,120,0.06), transparent 32%),
    linear-gradient(180deg, #ffffff 0%, var(--bg) 52%, #ffffff 100%);
}

.header {
  position: sticky;
  top: 0;
  z-index: 100;
  background:
    radial-gradient(circle at 20% 0%, rgba(255,255,255,0.16), transparent 24%),
    linear-gradient(135deg, var(--inim-blue-dark), var(--inim-blue));
  box-shadow: 0 18px 45px rgba(14,66,120,0.22);
}

.header-inner {
  max-width: 1480px;
  min-height: 230px;
  margin: 0 auto;
  padding: 38px 48px;
  display: grid;
  grid-template-columns: 210px 1fr 135px;
  gap: 40px;
  align-items: center;
}

.brand { display: flex; flex-direction: column; gap: 8px; }
.logo-img {
  width: 172px;
  max-height: 104px;
  object-fit: contain;
  object-position: left center;
  display: block;
}
.brand small { color: rgba(255,255,255,0.82); font-size: 13px; }

.search-box { position: relative; width: 100%; }
.search-box svg {
  position: absolute;
  left: 22px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--inim-blue);
  width: 26px;
  height: 26px;
}
.search-box input {
  width: 100%;
  height: 64px;
  background: #fff;
  border: 1px solid rgba(255,255,255,0.75);
  border-radius: 8px;
  padding: 0 22px 0 62px;
  color: var(--text);
  font-size: 17px;
  font-family: 'Kumbh Sans', sans-serif;
  outline: none;
  box-shadow: 0 14px 30px rgba(0,0,0,0.16);
}
.search-box input:focus { box-shadow: 0 0 0 4px rgba(255,255,255,0.28), 0 18px 36px rgba(0,0,0,0.18); }
.search-box input::placeholder { color: #8b96a3; }

.header-actions { display: flex; flex-direction: column; align-items: flex-end; gap: 16px; }
.header-title { color: #fff; font-size: 15px; font-weight: 600; white-space: nowrap; }
.filter-toggle {
  display: inline-flex; align-items: center; gap: 10px;
  height: 48px; padding: 0 18px;
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.48);
  color: #fff; border-radius: 6px;
  font-family: 'Kumbh Sans', sans-serif; font-weight: 600; font-size: 15px;
  cursor: pointer;
}
.filter-toggle:hover { background: rgba(255,255,255,0.15); }

.lang-toggle {
  display: inline-flex; align-items: center; gap: 8px;
  height: 40px; padding: 0 14px;
  background: rgba(255,255,255,0.12);
  border: 1px solid rgba(255,255,255,0.5);
  color: #fff; border-radius: 999px;
  font-family: 'Kumbh Sans', sans-serif; font-weight: 700; font-size: 13px;
  cursor: pointer;
  letter-spacing: 0.5px;
  transition: all 0.2s;
}
.lang-toggle:hover { background: rgba(255,255,255,0.22); }
.lang-toggle .lang-flag { font-size: 18px; line-height: 1; }

.filters-wrap { background: rgba(255,255,255,0.92); border-bottom: 1px solid var(--border); }
.filters {
  max-width: 1480px; margin: 0 auto; padding: 14px 48px;
  display: none; gap: 8px; align-items: center; flex-wrap: wrap;
}
.filters.open { display: flex; }
.filter-btn {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 999px;
  padding: 8px 14px;
  color: var(--text2);
  font-size: 12px;
  cursor: pointer;
  font-family: 'Kumbh Sans', sans-serif;
  transition: all 0.15s;
  white-space: nowrap;
}
.filter-btn:hover { border-color: var(--inim-blue); color: var(--inim-blue); }
.filter-btn.active { background: var(--inim-blue); border-color: var(--inim-blue); color: #fff; }

.stats {
  font-size: 13px; color: var(--text2);
  padding: 0 48px; max-width: 1480px; margin: 22px auto 8px;
}
.stats strong { color: var(--inim-blue); }

.grid {
  max-width: 1480px; margin: 0 auto; padding: 12px 48px 48px;
  display: flex; flex-direction: column; gap: 14px;
}
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  overflow: hidden;
  transition: border-color 0.2s, transform 0.2s, box-shadow 0.2s;
  cursor: pointer;
  display: flex; flex-direction: row;
  box-shadow: 0 10px 26px rgba(14,66,120,0.06);
}
.card:hover { border-color: var(--inim-blue); transform: translateY(-2px); box-shadow: var(--shadow); }
.card-img { width: 255px; min-width: 255px; min-height: 207px; background: linear-gradient(135deg,#f8fbfd,#eaf2f8); display: flex; align-items: center; justify-content: center; overflow: hidden; }
.card-img img { max-width: 218px; max-height: 180px; object-fit: contain; }
.card-img .no-img { color: var(--text2); font-size: 12px; }
.card-body { padding: 16px 20px; flex: 1; min-width: 0; display: flex; flex-direction: column; }
.card-top { display: flex; align-items: baseline; gap: 10px; margin-bottom: 6px; flex-wrap: wrap; }
.card-code { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--inim-blue); font-weight: 600; }
.card-id { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text2); }
.card-desc { font-size: 15px; font-weight: 700; line-height: 1.35; margin-bottom: 7px; }
.card-long { font-size: 12.8px; line-height: 1.58; color: var(--text2); margin-bottom: 10px; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
.card-footer { display: flex; justify-content: space-between; align-items: center; margin-top: auto; gap: 14px; }
.card-price { font-size: 19px; font-weight: 800; color: var(--inim-blue); }
.card-price span { font-size: 12px; font-weight: 400; color: var(--text2); }
.card-cat { font-size: 11px; color: var(--inim-blue); background: var(--surface2); padding: 5px 10px; border-radius: 999px; max-width: 220px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

.initial-state, .empty {
  max-width: 900px;
  min-height: calc(100vh - 310px);
  margin: 0 auto;
  padding: 120px 32px 80px;
  text-align: center;
  position: relative;
  overflow: hidden;
}
.initial-state::before {
  content: 'inim';
  position: absolute;
  left: 50%; top: 46%; transform: translate(-50%,-50%);
  font-size: clamp(190px, 38vw, 520px);
  font-weight: 800;
  letter-spacing: -0.1em;
  color: rgba(14,66,120,0.035);
  z-index: -1;
}
.initial-icon, .empty-icon { color: var(--inim-blue); margin-bottom: 22px; }
.initial-state h1, .empty h1 { font-size: clamp(28px, 4vw, 42px); color: var(--inim-blue); margin-bottom: 14px; }
.initial-state p, .empty p { font-size: 18px; line-height: 1.6; color: var(--text2); }

.modal-overlay { position: fixed; inset: 0; z-index: 200; background: rgba(4,22,40,0.72); backdrop-filter: blur(8px); display: flex; align-items: center; justify-content: center; padding: 24px; animation: fadeIn 0.15s; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
.modal { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; max-width: 840px; width: 100%; max-height: 90vh; overflow-y: auto; animation: slideUp 0.2s; box-shadow: var(--shadow); }
@keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: none; opacity: 1; } }
.modal-header { display: flex; gap: 22px; padding: 26px; border-bottom: 1px solid var(--border); }
.modal-img { width: 210px; min-width: 210px; height: 190px; background: linear-gradient(135deg,#f8fbfd,#eaf2f8); border-radius: 12px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
.modal-img img { max-width: 90%; max-height: 165px; object-fit: contain; }
.modal-info { flex: 1; }
.modal-code { font-family: 'JetBrains Mono', monospace; font-size: 13px; color: var(--inim-blue); margin-bottom: 5px; font-weight: 600; }
.modal-id { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text2); margin-bottom: 10px; }
.modal-title { font-size: 20px; font-weight: 700; line-height: 1.35; margin-bottom: 14px; }
.modal-price { font-size: 28px; font-weight: 800; color: var(--inim-blue); }
.modal-price span { font-size: 13px; color: var(--text2); font-weight: 400; }
.modal-tags { display: flex; gap: 6px; margin-top: 12px; flex-wrap: wrap; }
.modal-tag { font-size: 11px; padding: 5px 10px; background: var(--surface2); border-radius: 999px; color: var(--inim-blue); }
.modal-body { padding: 26px; }
.modal-section-title { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--inim-blue); margin-bottom: 10px; }
.modal-long { font-size: 14px; line-height: 1.75; color: var(--text2); margin-bottom: 20px; }
.modal-acc { background: var(--surface2); border-radius: 8px; padding: 11px 14px; margin-top: 8px; }
.modal-acc-code { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--inim-blue); font-weight: 600; }
.modal-acc-desc { font-size: 13px; color: var(--text2); }
.modal-close { position: absolute; top: 16px; right: 16px; background: #fff; border: none; border-radius: 8px; width: 38px; height: 38px; cursor: pointer; color: var(--inim-blue); font-size: 18px; display: flex; align-items: center; justify-content: center; box-shadow: 0 8px 20px rgba(0,0,0,0.16); }
.modal-close:hover { background: var(--inim-blue); color: #fff; }

@media (max-width: 900px) {
  .header-inner { grid-template-columns: 1fr; min-height: auto; gap: 22px; padding: 28px 20px; }
  .header-actions { flex-direction: row; justify-content: space-between; align-items: center; gap: 16px; }
  .filters { padding: 14px 20px; }
  .grid, .stats { padding-left: 20px; padding-right: 20px; }
}
@media (max-width: 600px) {
  .card { flex-direction: column; }
  .card-img { width: 100%; min-width: unset; height: 150px; }
  .modal-header { flex-direction: column; }
  .modal-img { width: 100%; min-width: unset; }
  .search-box input { height: 58px; font-size: 15px; }
}
</style>

<style>
*{
    -webkit-user-select:text !important;
    -moz-user-select:text !important;
    -ms-user-select:text !important;
    user-select:text !important;
}

.card,
.card *,
.modal,
.modal *{
    cursor:text !important;
}
</style>


<style>
.card-long{
  display:block !important;
  -webkit-line-clamp:unset !important;
  overflow:visible !important;
  max-height:none !important;
  white-space:normal !important;
}

.copy-btn{

  font-weight:600;

  font-family:'Kumbh Sans', sans-serif;
  z-index:9999;
  box-shadow:0 10px 30px rgba(0,0,0,.15);
}
</style>


<style>

  display:block !important;

}

}

}
</style>

</style>

function T(key){ return UI[state.lang][key] || UI.es[key] || key; }
function isIT(){ return state.lang === 'it'; }
function pDesc(p){ return isIT() ? (p.desc_it || p.desc) : p.desc; }
function pLong(p){ return isIT() ? (p.long_it || p.long) : p.long; }
function pCat(p){ return isIT() ? (p.cat_it || p.cat) : p.cat; }
function pSub(p){ return isIT() ? (p.sub_it || p.sub) : p.sub; }
function accDesc(a){ return isIT() ? (a.desc_it || a.desc) : a.desc; }
function catLabel(c){
  if(!isIT()) return c;
  const sample = PRODUCTS.find(p => p.cat === c);
  return sample && sample.cat_it ? sample.cat_it : c;
}

function toggleLang(){
  state.lang = state.lang === 'es' ? 'it' : 'es';
  document.documentElement.style.setProperty('--click-label', '"' + T('clickToEnlarge') + '"');
  render();
  document.getElementById('searchInput').focus();
}

let state = {
  search: '',
  cat: '',
  selected: null,
  filtersOpen: false,
  cart: [],
  lang: 'es',
};

function normalize(s) {
  return String(s || '').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
}

function hasSearch() {
  return normalize(state.search).trim().length > 0 || Boolean(state.cat);
}

function filtered() {
  let list = PRODUCTS;
  const q = normalize(state.search).trim();
  if (q) {
    list = list.filter(p =>
      normalize(p.code).includes(q) ||
      normalize(p.id).includes(q) ||
      normalize(p.desc).includes(q) ||
      normalize(p.long).includes(q) ||
      normalize(p.cat).includes(q) ||
      normalize(p.sub).includes(q)
    );
  }
  if (state.cat) list = list.filter(p => p.cat === state.cat);
  if (!q && !state.cat) return [];
  return list;
}

function renderInitialState() {
  return `
    <section class="initial-state">
      <div class="initial-icon">
        <svg width="96" height="96" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="11" cy="11" r="7"/><path d="m20 20-4.2-4.2"/></svg>
      </div>
      <h1>${T('searchPromptTitle')}</h1>
      <p>${T('searchPromptDesc')}</p>
    </section>
  `;
}

function renderEmptyState() {
  return `
    <section class="empty">
      <div class="empty-icon">
        <svg width="82" height="82" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="11" cy="11" r="7"/><path d="m20 20-4.2-4.2"/></svg>
      </div>
      <h1>${T('emptyTitle')}</h1>
      <p>${T('emptyDesc')}</p>

  `;
}

            <span class="lang-flag">${T('langFlag')}</span> ${T('langLabel')}
          </button>
          <button class="filter-toggle" id="filterToggle" type="button">
            <svg width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 7h16"/><path d="M7 12h10"/><path d="M10 17h4"/></svg>
            ${T('categories')}
          </button>
        </div>
      </div>
    </div>
    <div class="filters-wrap">
      <div class="filters ${state.filtersOpen ? 'open' : ''}">
        <button class="filter-btn ${!state.cat ? 'active' : ''}" data-cat="">${T('allCategories')}</button>
        ${CATS.map(c => `<button class="filter-btn ${state.cat === c ? 'active' : ''}" data-cat="${c}">${catLabel(c)}</button>`).join('')}
      </div>
    </div>

    ${searched ? `<div class=”stats”><strong>${results.length}</strong> ${results.length !== 1 ? T('products') : T('product')} ${results.length !== 1 ? T('found') : T('foundSingular')}${state.cat ? ' ' + T('in') + ' <strong>' + catLabel(state.cat) + '</strong>' : ''}${state.search.trim() ? ' ' + T('for') + ' “<strong>' + state.search + '</strong>”' : ''}</div>` : ''}
    ${renderCartPanel()}
    ${!searched ? renderInitialState() : results.length === 0 ? renderEmptyState() : `
      <div class="grid">
        ${results.slice(0, 60).map((p, idx) => `
          <div class="card" data-idx="${idx}">
            ${p.img ? `<a class="card-img-link" href="${p.img}" target="_blank" rel="noopener noreferrer" title="${T('clickToEnlarge')}"><img src="${p.img}" alt="${pDesc(p)}" loading="lazy" onerror="this.parentElement.innerHTML='<span class=no-img>${T('noImage')}</span>'"></a>` : `<div class="card-img"><span class="no-img">${T('noImage')}</span></div>`}
            <div class="card-body">
              <div class="card-top">
                <span class="card-code">${p.code}</span>
                <span class="card-id">${p.id}</span>
              </div>
              <div class="card-desc">${pDesc(p)}</div>
              ${p.long ? `<div class="card-long">${pLong(p)}</div><div class="cart-actions"><button class="copy-btn" onclick="event.stopPropagation(); copiarDescripcionResultado(${idx})">${T('copyDesc')}</button><button class="add-cart-btn ${estaEnCarrito(p.id) ? 'added' : ''}" onclick="event.stopPropagation(); agregarAlCarritoResultado(${idx})">${estaEnCarrito(p.id) ? T('added') : T('addToCart')}</button></div>` : ''}
              <div class="card-footer">
                <div class="card-price">${p.pvp.toFixed(2)} €<span> ${T('pvp')}</span><span class="price-note">${T('priceNote')}</span></div>
                <div class="card-cat">${pSub(p) || pCat(p)}</div>
              </div>
            </div>
          </div>
        `).join('')}
      </div>
      ${results.length > 60 ? '<div class="stats" style="text-align:center;padding-bottom:40px">' + T('showing') + ' 60 ' + T('of') + ' ' + results.length + ' — ' + T('refineSearch') + '</div>' : ''}
    `}

  `;

  const searchInput = document.getElementById('searchInput');
  searchInput.addEventListener('input', e => {
    state.search = e.target.value;
    state.selected = null;
    render();
    const input = document.getElementById('searchInput');
    input.focus();
    input.setSelectionRange(input.value.length, input.value.length);
  });

  document.getElementById('filterToggle').addEventListener('click', () => {
    const wasOpen = state.filtersOpen;
    state.filtersOpen = !state.filtersOpen;
    if (wasOpen && !state.filtersOpen && state.cat) {
      state.cat = '';
    }
    render();
    document.getElementById('searchInput').focus();
  });

  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      state.cat = btn.dataset.cat;
      state.selected = null;
      render();
      document.getElementById('searchInput').focus();
    });
  });
const overlay = document.querySelector('.modal-overlay');
  if (overlay) {
    overlay.addEventListener('click', e => {
      if (e.target === overlay) { state.selected = null; render(); }
    });
  }
  const closeBtn = document.querySelector('.modal-close');
  if (closeBtn) closeBtn.addEventListener('click', () => { state.selected = null; render(); });
}


function estaEnCarrito(id){
  return state.cart.some(item => item.id === id);
}

function agregarAlCarritoResultado(index){
  const resultados = filtered();
  const p = resultados[index];
  if(!p) return;

  if(!estaEnCarrito(p.id)){
    state.cart.push({...p, qty:1});
  }
  render();
}

function quitarDelCarrito(id){
  state.cart = state.cart.filter(item => item.id !== id);
  render();
}

function vaciarCarrito(){
  state.cart = [];
  render();
}

function renderCartPanel(){
  if(!state.cart.length){
    return `
      <div class="cart-panel">
        <div class="cart-box">
          <div><span class="cart-title">${T('cartTitle')}</span> · ${T('cartEmpty')}</div>
        </div>
      </div>
    `;
  }

  const total = state.cart.reduce((sum, p) => sum + Number(p.pvp || 0), 0);

  return `
    <div class="cart-panel">
      <div class="cart-box">
        <div><span class="cart-title">${T('cartTitle')}</span> · ${state.cart.length} ${state.cart.length !== 1 ? T('products') : T('product')} · ${T('cartTotal')}: ${total.toFixed(2)} €</div>
        <div class="cart-actions">
          <button class="cart-btn" onclick="exportarCarritoExcel()">${T('exportExcel')}</button>
          <button class="cart-btn" onclick="vaciarCarrito()">${T('emptyCart')}</button>
        </div>
        <div class="cart-list">
          ${state.cart.map(p => `
            <div class="cart-line">
              <span><strong>${p.code}</strong> · ${pDesc(p)} · ${Number(p.pvp || 0).toFixed(2)} €</span>
              <button onclick="quitarDelCarrito('${p.id}')">${T('remove')}</button>
            </div>
          `).join('')}
        </div>
      </div>
    </div>
  `;
}

function obtenerUrlProducto(producto){
  return producto.url || producto.productUrl || producto.link || producto.href || producto.img || '';
}


const INIM_COLORS = {
  blueDark: 'FF07305A',
  blueMid: 'FF0E4278',
  blueAccent: 'FF16558F',
  blueLight: 'FFEAF2F8',
  blueSoft: 'FFF5F8FC',
  bluePale: 'FFFAFBFD',
  textDark: 'FF14385C',
  textMuted: 'FF6B7C8F',
  white: 'FFFFFFFF',
  border: 'FFD9E4EF',
  borderLight: 'FFECF1F7',
  success: 'FF1A7A4D',
  gold: 'FFBF8B2E',
  rowEven: 'FFFFFFFF',
  rowOdd: 'FFF7F9FC'
};

function construirTextoAdicional(producto){
  if(!Array.isArray(producto.accessories) || !producto.accessories.length) return '';
  return producto.accessories
    .map(acc => [acc.code, accDesc(acc)].filter(Boolean).join(' - '))
    .filter(Boolean)
    .join(' | ');
}

function obtenerPrecioAdicional(producto){
  if(!Array.isArray(producto.accessories) || !producto.accessories.length) return 0;
  return producto.accessories.reduce((sum, acc) => sum + Number(acc.price || 0), 0);
}




const EURO_FMT = '#,##0.00" €"';
const NUM_COLS = 8;

function xBorder(color, style){ return { style: style || 'thin', color: { rgb: color || INIM_COLORS.borderLight } }; }
function xBorders(color, style){ const b = xBorder(color, style); return { top: b, right: b, bottom: b, left: b }; }
function xBordersCustom(opts){ return { top: xBorder(opts.t || opts.a, opts.ts || opts.s), right: xBorder(opts.r || opts.a, opts.rs || opts.s), bottom: xBorder(opts.b || opts.a, opts.bs || opts.s), left: xBorder(opts.l || opts.a, opts.ls || opts.s) }; }

function xCell(value, style, type){
  const cell = { v: value, t: type || (typeof value === 'number' ? 'n' : 's'), s: style || {} };
  if(style && style.numFmt) cell.z = style.numFmt;
  return cell;
}

function xEmptyCell(style){
  return { v: '', t: 's', s: style || {} };
}

function fillRow(ws, rowIdx, numCols, style){
  for(let c = 0; c < numCols; c++){
    const ref = XLSX.utils.encode_cell({ r: rowIdx, c });
    if(!ws[ref]) ws[ref] = xEmptyCell(style);
  }
}

function descHeight(text){
  const len = String(text || '').length;
  return Math.max(44, Math.min(120, 28 + Math.ceil(len / 80) * 16));
}

function exportarCarritoExcel(){
  if(!state.cart.length){
    alert(isIT() ? 'Non ci sono prodotti nel carrello.' : 'No hay productos en el carrito.');
    return;
  }
  if(typeof XLSX === 'undefined'){
    alert(isIT() ? 'Impossibile caricare la libreria Excel. Ricarica la pagina e riprova.' : 'No se pudo cargar la librería de Excel. Recarga la página e inténtalo de nuevo.');
    return;
  }

  const C = INIM_COLORS;
  const wb = XLSX.utils.book_new();
  const ws = {};
  const merges = [];
  const rowInfo = [];
  let r = 0;

  // ── ROW 1: Brand bar ──
  const brandStyle = {
    font: { name: 'Calibri', sz: 22, bold: true, color: { rgb: C.white } },
    fill: { patternType: 'solid', fgColor: { rgb: C.blueDark } },
    alignment: { horizontal: 'left', vertical: 'center' },
    border: xBorders(C.blueDark, 'medium')
  };
  ws.A1 = xCell(T('xlBrand'), brandStyle);
  fillRow(ws, 0, NUM_COLS, brandStyle);
  merges.push(XLSX.utils.decode_range('A1:H1'));
  rowInfo[r] = { hpt: 48 };
  r++;

  // ── ROW 2: Subtitle ──
  const subtitleStyle = {
    font: { name: 'Calibri', sz: 11, color: { rgb: C.blueAccent } },
    fill: { patternType: 'solid', fgColor: { rgb: C.blueLight } },
    alignment: { horizontal: 'left', vertical: 'center' },
    border: xBordersCustom({ a: C.borderLight, b: C.border, bs: 'thin' })
  };
  ws[XLSX.utils.encode_cell({r,c:0})] = xCell(T('xlSubtitle'), subtitleStyle);
  fillRow(ws, r, NUM_COLS, subtitleStyle);
  merges.push(XLSX.utils.decode_range(`A${r+1}:H${r+1}`));
  rowInfo[r] = { hpt: 24 };
  r++;

  // ── ROW 3: Date + meta ──
  const locale = isIT() ? 'it-IT' : 'es-ES';
  const fecha = new Date().toLocaleDateString(locale, { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
  const hora = new Date().toLocaleTimeString(locale, { hour: '2-digit', minute: '2-digit' });
  const metaStyle = {
    font: { name: 'Calibri', sz: 9, italic: true, color: { rgb: C.textMuted } },
    fill: { patternType: 'solid', fgColor: { rgb: C.bluePale } },
    alignment: { horizontal: 'left', vertical: 'center' },
    border: xBordersCustom({ a: C.borderLight })
  };
  ws[XLSX.utils.encode_cell({r,c:0})] = xCell(`  ${T('xlGenerated')}: ${fecha} ${T('xlAt')} ${hora}  ·  ${state.cart.length} ${state.cart.length !== 1 ? T('products') : T('product')} ${state.cart.length !== 1 ? T('xlSelected') : T('xlSelectedSingular')}`, metaStyle);
  fillRow(ws, r, NUM_COLS, metaStyle);
  merges.push(XLSX.utils.decode_range(`A${r+1}:H${r+1}`));
  rowInfo[r] = { hpt: 20 };
  r++;

  // ── ROW 4: Spacer ──
  const spacerStyle = {
    fill: { patternType: 'solid', fgColor: { rgb: C.white } },
    border: { bottom: xBorder(C.border, 'thin') }
  };
  fillRow(ws, r, NUM_COLS, spacerStyle);
  merges.push(XLSX.utils.decode_range(`A${r+1}:H${r+1}`));
  rowInfo[r] = { hpt: 6 };
  r++;

  // ── ROW 5: Column headers ──
  const headers = [T('xlRef'), T('xlProduct'), T('xlShortDesc'), T('xlUnitPrice'), T('xlQty'), T('xlSubtotalCol'), T('xlImage'), T('xlNotes')];
  const headerStyle = {
    font: { name: 'Calibri', sz: 10, bold: true, color: { rgb: C.white } },
    fill: { patternType: 'solid', fgColor: { rgb: C.blueMid } },
    alignment: { horizontal: 'center', vertical: 'center', wrapText: true },
    border: xBorders(C.blueDark, 'thin')
  };
  headers.forEach((h, i) => {
    const style = { ...headerStyle };
    if(i <= 2) style.alignment = { ...style.alignment, horizontal: 'left' };
    ws[XLSX.utils.encode_cell({ r, c: i })] = xCell(h, style);
  });
  rowInfo[r] = { hpt: 28 };
  const headerRow = r;
  r++;

  // ── PRODUCT ROWS ──
  let totalGeneral = 0;
  let totalAccesorios = 0;
  let itemCount = 0;

  state.cart.forEach((producto, idx) => {
    const precio = Number(producto.pvp || 0);
    const descripcionCorta = pDesc(producto);
    const descripcionLarga = pLong(producto) || pDesc(producto);
    const accesorios = construirTextoAdicional(producto);
    const precioAcc = obtenerPrecioAdicional(producto);
    const url = obtenerUrlProducto(producto);
    const isOdd = idx % 2 === 1;
    const rowBg = isOdd ? C.rowOdd : C.rowEven;
    const separatorBg = isOdd ? C.bluePale : C.blueSoft;

    totalGeneral += precio;
    totalAccesorios += precioAcc;
    itemCount++;

    // ── Main product row ──
    const mainBase = {
      font: { name: 'Calibri', sz: 10, bold: true, color: { rgb: C.textDark } },
      fill: { patternType: 'solid', fgColor: { rgb: rowBg } },
      alignment: { horizontal: 'left', vertical: 'center', wrapText: true },
      border: xBordersCustom({ a: C.borderLight, t: C.border, ts: 'thin' })
    };
    const mainCenter = { ...mainBase, alignment: { ...mainBase.alignment, horizontal: 'center' } };
    const mainRight = { ...mainBase, alignment: { ...mainBase.alignment, horizontal: 'right' } };

    const codeStyle = {
      ...mainBase,
      font: { name: 'Consolas', sz: 10, bold: true, color: { rgb: C.blueMid } }
    };

    ws[XLSX.utils.encode_cell({r, c:0})] = xCell(producto.code || '', codeStyle);
    ws[XLSX.utils.encode_cell({r, c:1})] = xCell(descripcionCorta, mainBase);
    ws[XLSX.utils.encode_cell({r, c:2})] = xCell(
      descripcionLarga.length > 100 ? `${descripcionLarga.slice(0, 97)}...` : descripcionLarga,
      { ...mainBase, font: { ...mainBase.font, bold: false, color: { rgb: C.textMuted } } }
    );
    ws[XLSX.utils.encode_cell({r, c:3})] = xCell(precio, { ...mainRight, numFmt: EURO_FMT }, 'n');
    ws[XLSX.utils.encode_cell({r, c:4})] = xCell(1, mainCenter, 'n');
    ws[XLSX.utils.encode_cell({r, c:5})] = xCell(precio, { ...mainRight, numFmt: EURO_FMT, font: { ...mainBase.font, color: { rgb: C.blueDark } } }, 'n');

    const linkCell = xCell(url ? T('xlSee') : '', {
      ...mainCenter,
      font: { name: 'Calibri', sz: 9, bold: true, underline: !!url, color: { rgb: url ? C.blueAccent : C.textMuted } }
    });
    if(url) linkCell.l = { Target: url };
    ws[XLSX.utils.encode_cell({r, c:6})] = linkCell;
    ws[XLSX.utils.encode_cell({r, c:7})] = xEmptyCell(mainBase);

    rowInfo[r] = { hpt: 26 };
    r++;

    // ── Description sub-row ──
    const descLabelStyle = {
      font: { name: 'Calibri', sz: 8, bold: true, color: { rgb: C.blueAccent } },
      fill: { patternType: 'solid', fgColor: { rgb: separatorBg } },
      alignment: { horizontal: 'right', vertical: 'top', wrapText: true },
      border: xBordersCustom({ a: C.borderLight })
    };
    const descTextStyle = {
      font: { name: 'Calibri', sz: 9, color: { rgb: C.textDark } },
      fill: { patternType: 'solid', fgColor: { rgb: separatorBg } },
      alignment: { horizontal: 'left', vertical: 'top', wrapText: true },
      border: xBordersCustom({ a: C.borderLight })
    };

    ws[XLSX.utils.encode_cell({r, c:0})] = xCell(T('xlDetail'), descLabelStyle);
    ws[XLSX.utils.encode_cell({r, c:1})] = xCell(descripcionLarga, descTextStyle);
    for(let c = 2; c < NUM_COLS; c++) ws[XLSX.utils.encode_cell({r, c})] = xEmptyCell(descTextStyle);
    merges.push(XLSX.utils.decode_range(`B${r+1}:H${r+1}`));
    rowInfo[r] = { hpt: descHeight(descripcionLarga) };
    r++;

    // ── Accessories sub-row ──
    if(accesorios || precioAcc > 0){
      const accLabelStyle = {
        font: { name: 'Calibri', sz: 8, bold: true, color: { rgb: C.white } },
        fill: { patternType: 'solid', fgColor: { rgb: C.blueAccent } },
        alignment: { horizontal: 'right', vertical: 'center', wrapText: true },
        border: xBorders(C.blueAccent, 'thin')
      };
      const accTextStyle = {
        font: { name: 'Calibri', sz: 9, color: { rgb: C.white } },
        fill: { patternType: 'solid', fgColor: { rgb: C.blueAccent } },
        alignment: { horizontal: 'left', vertical: 'center', wrapText: true },
        border: xBorders(C.blueAccent, 'thin')
      };
      const accNumStyle = {
        ...accTextStyle,
        font: { ...accTextStyle.font, bold: true },
        alignment: { ...accTextStyle.alignment, horizontal: 'right' },
        numFmt: EURO_FMT
      };

      ws[XLSX.utils.encode_cell({r, c:0})] = xCell(T('xlAccessories'), accLabelStyle);
      ws[XLSX.utils.encode_cell({r, c:1})] = xCell(accesorios || T('xlNoAcc'), accTextStyle);
      ws[XLSX.utils.encode_cell({r, c:2})] = xEmptyCell(accTextStyle);
      merges.push(XLSX.utils.decode_range(`B${r+1}:C${r+1}`));
      ws[XLSX.utils.encode_cell({r, c:3})] = xCell(precioAcc, accNumStyle, 'n');
      ws[XLSX.utils.encode_cell({r, c:4})] = xCell(precioAcc > 0 ? 1 : '', { ...accTextStyle, alignment: { ...accTextStyle.alignment, horizontal: 'center' } }, precioAcc > 0 ? 'n' : 's');
      ws[XLSX.utils.encode_cell({r, c:5})] = xCell(precioAcc, accNumStyle, 'n');
      ws[XLSX.utils.encode_cell({r, c:6})] = xEmptyCell(accTextStyle);
      ws[XLSX.utils.encode_cell({r, c:7})] = xEmptyCell(accTextStyle);
      rowInfo[r] = { hpt: 22 };
      r++;
    }

    // ── Thin separator between products ──
    const sepStyle = {
      fill: { patternType: 'solid', fgColor: { rgb: C.white } },
      border: { bottom: xBorder(C.border, 'thin') }
    };
    fillRow(ws, r, NUM_COLS, sepStyle);
    merges.push(XLSX.utils.decode_range(`A${r+1}:H${r+1}`));
    rowInfo[r] = { hpt: 4 };
    r++;
  });

  // ── SPACER before totals ──
  const preTotalSpacer = {
    fill: { patternType: 'solid', fgColor: { rgb: C.white } },
    border: {}
  };
  fillRow(ws, r, NUM_COLS, preTotalSpacer);
  merges.push(XLSX.utils.decode_range(`A${r+1}:H${r+1}`));
  rowInfo[r] = { hpt: 10 };
  r++;

  // ── SUMMARY: Items count ──
  const summaryLabelStyle = {
    font: { name: 'Calibri', sz: 10, bold: true, color: { rgb: C.textDark } },
    fill: { patternType: 'solid', fgColor: { rgb: C.blueLight } },
    alignment: { horizontal: 'right', vertical: 'center' },
    border: xBordersCustom({ a: C.borderLight, t: C.blueMid, ts: 'medium' })
  };
  const summaryValStyle = {
    font: { name: 'Calibri', sz: 10, bold: true, color: { rgb: C.blueMid } },
    fill: { patternType: 'solid', fgColor: { rgb: C.blueLight } },
    alignment: { horizontal: 'right', vertical: 'center' },
    border: xBordersCustom({ a: C.borderLight, t: C.blueMid, ts: 'medium' }),
    numFmt: EURO_FMT
  };
  const emptySummary = {
    fill: { patternType: 'solid', fgColor: { rgb: C.blueLight } },
    border: xBordersCustom({ a: C.borderLight, t: C.blueMid, ts: 'medium' })
  };

  fillRow(ws, r, NUM_COLS, emptySummary);
  ws[XLSX.utils.encode_cell({r, c:3})] = xCell(T('xlProducts'), summaryLabelStyle);
  ws[XLSX.utils.encode_cell({r, c:4})] = xCell(itemCount, { ...summaryValStyle, alignment: { horizontal: 'center', vertical: 'center' } }, 'n');
  ws[XLSX.utils.encode_cell({r, c:5})] = xCell(totalGeneral, summaryValStyle, 'n');
  merges.push(XLSX.utils.decode_range(`A${r+1}:C${r+1}`));
  rowInfo[r] = { hpt: 24 };
  r++;

  // ── SUMMARY: Accessories total ──
  if(totalAccesorios > 0){
    const accSumStyle = {
      fill: { patternType: 'solid', fgColor: { rgb: C.blueLight } },
      border: xBordersCustom({ a: C.borderLight })
    };
    fillRow(ws, r, NUM_COLS, accSumStyle);
    ws[XLSX.utils.encode_cell({r, c:3})] = xCell(T('xlAccLabel'), { ...summaryLabelStyle, border: xBordersCustom({ a: C.borderLight }) });
    ws[XLSX.utils.encode_cell({r, c:4})] = xEmptyCell(accSumStyle);
    ws[XLSX.utils.encode_cell({r, c:5})] = xCell(totalAccesorios, { ...summaryValStyle, border: xBordersCustom({ a: C.borderLight }) }, 'n');
    merges.push(XLSX.utils.decode_range(`A${r+1}:C${r+1}`));
    rowInfo[r] = { hpt: 22 };
    r++;
  }

  // ── SUMMARY: Grand total ──
  const totalLabelStyle = {
    font: { name: 'Calibri', sz: 13, bold: true, color: { rgb: C.white } },
    fill: { patternType: 'solid', fgColor: { rgb: C.blueDark } },
    alignment: { horizontal: 'right', vertical: 'center' },
    border: xBorders(C.blueDark, 'medium')
  };
  const totalValStyle = {
    font: { name: 'Calibri', sz: 13, bold: true, color: { rgb: C.white } },
    fill: { patternType: 'solid', fgColor: { rgb: C.blueDark } },
    alignment: { horizontal: 'right', vertical: 'center' },
    border: xBorders(C.blueDark, 'medium'),
    numFmt: EURO_FMT
  };
  const emptyTotal = {
    fill: { patternType: 'solid', fgColor: { rgb: C.blueDark } },
    border: xBorders(C.blueDark, 'medium')
  };

  fillRow(ws, r, NUM_COLS, emptyTotal);
  ws[XLSX.utils.encode_cell({r, c:3})] = xCell(T('xlTotal'), totalLabelStyle);
  ws[XLSX.utils.encode_cell({r, c:4})] = xEmptyCell(emptyTotal);
  ws[XLSX.utils.encode_cell({r, c:5})] = xCell(totalGeneral + totalAccesorios, totalValStyle, 'n');
  merges.push(XLSX.utils.decode_range(`A${r+1}:C${r+1}`));
  merges.push(XLSX.utils.decode_range(`F${r+1}:H${r+1}`));
  rowInfo[r] = { hpt: 32 };
  r++;

  // ── Spacer ──
  fillRow(ws, r, NUM_COLS, { fill: { patternType: 'solid', fgColor: { rgb: C.white } } });
  merges.push(XLSX.utils.decode_range(`A${r+1}:H${r+1}`));
  rowInfo[r] = { hpt: 8 };
  r++;

  // ── FOOTER ──
  const footerStyle = {
    font: { name: 'Calibri', sz: 8, italic: true, color: { rgb: C.textMuted } },
    fill: { patternType: 'solid', fgColor: { rgb: C.bluePale } },
    alignment: { horizontal: 'left', vertical: 'center' },
    border: xBordersCustom({ a: C.borderLight, t: C.border, ts: 'thin' })
  };
  ws[XLSX.utils.encode_cell({r, c:0})] = xCell(T('xlFooter'), footerStyle);
  fillRow(ws, r, NUM_COLS, footerStyle);
  merges.push(XLSX.utils.decode_range(`A${r+1}:H${r+1}`));
  rowInfo[r] = { hpt: 18 };
  r++;

  // ── Sheet config ──
  ws['!ref'] = XLSX.utils.encode_range({ s: { r: 0, c: 0 }, e: { r: r - 1, c: NUM_COLS - 1 } });
  ws['!merges'] = merges;
  ws['!rows'] = rowInfo;
  ws['!cols'] = [
    { wch: 16 },
    { wch: 34 },
    { wch: 48 },
    { wch: 14 },
    { wch: 8 },
    { wch: 16 },
    { wch: 10 },
    { wch: 18 }
  ];
  ws['!freeze'] = { xSplit: 0, ySplit: headerRow + 1, topLeftCell: `A${headerRow + 2}`, activePane: 'bottomLeft', state: 'frozen' };
  ws['!autofilter'] = { ref: `A${headerRow + 1}:H${headerRow + 1}` };

  XLSX.utils.book_append_sheet(wb, ws, T('xlSheetName'));

  const ts = new Date().toISOString().slice(0,10);
  XLSX.writeFile(wb, `INIM_carrito_${ts}.xlsx`, {
    cellStyles: true,
    bookType: 'xlsx'
  });
}

function renderModal(p) {
  if (!p) return '';
  return `
    <div class="modal-overlay">
      <div class="modal" style="position:relative">
        <button class="modal-close">✕</button>
        <div class="modal-header">
          <div class="modal-img">
            ${p.img ? `<img src="${p.img}" alt="${pDesc(p)}" onerror="this.parentElement.innerHTML='<span class=no-img>${T("noImage")}</span>'">` : `<span class="no-img">${T("noImage")}</span>`}
          </div>
          <div class="modal-info">
            <div class="modal-code">${p.code}</div>
            <div class="modal-id">${T("setCode")}: ${p.id}</div>
            <div class="modal-title">${pDesc(p)}</div>
            <div class="modal-price">${p.pvp.toFixed(2)} €<span> ${T("pvp")}</span><span class="price-note">${T("priceNote")}</span></div>
            <div class="modal-tags">
              <span class="modal-tag">${pCat(p)}</span>
              ${p.sub ? `<span class="modal-tag">${pSub(p)}</span>` : ''}
            </div>
          </div>
        </div>
        <div class="modal-body">
          ${pLong(p) ? `
            <div class="modal-section-title">${T("techDesc")}</div>
            <div class="modal-long">${pLong(p)}</div>
          ` : ''}
          ${p.accessories.length ? `
            <div class="modal-section-title">${T("includedAcc")}</div>
            ${p.accessories.map(a => `
              <div class="modal-acc">
                <span class="modal-acc-code">${a.code}</span>
                <span class="modal-acc-desc"> — ${accDesc(a)}${a.price ? ' · ' + a.price.toFixed(2) + ' €' : ''}</span>
              </div>
            `).join('')}
          ` : ''}
        </div>
      </div>
    </div>
  `;
}

// Keyboard
document.addEventListener('keydown', e => {
  if (e.key === 'Escape' && state.selected !== null) {
    state.selected = null;
    render();
  }
});

render();
document.getElementById('searchInput').focus();
</script>




<script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.min.js"></script>
<script>
function copiarTextoSeguro(texto){
  const copiarFallback = function(){
    const area = document.createElement('textarea');
    area.value = texto;
    area.setAttribute('readonly', '');
    area.style.position = 'fixed';
    area.style.left = '-9999px';
    document.body.appendChild(area);
    area.select();
    document.execCommand('copy');
    area.remove();
    mostrarToastCopia();
  };

  if(navigator.clipboard && window.isSecureContext){
    navigator.clipboard.writeText(texto).then(mostrarToastCopia).catch(copiarFallback);
  }else{
    copiarFallback();
  }
}

function copiarDescripcionResultado(index){
  const resultados = filtered();
  const p = resultados[index];
  if(!p || !pLong(p)) return;
  copiarTextoSeguro(pLong(p));
}

function mostrarToastCopia(){
  const existente = document.querySelector('.copy-toast');
  if(existente) existente.remove();

  const toast = document.createElement('div');
  toast.className = 'copy-toast';
  toast.innerText = T('descCopied');
  document.body.appendChild(toast);

  setTimeout(function(){
    toast.remove();
  }, 2000);
}
</script>
